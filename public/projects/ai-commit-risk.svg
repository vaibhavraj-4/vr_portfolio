<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AI Commit Risk Analyser — SonarQube + LLM code review">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#141b26"/>
    </linearGradient>
    <linearGradient id="teal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17a2b8"/>
      <stop offset="100%" stop-color="#0f7a8c"/>
    </linearGradient>
    <linearGradient id="green1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amber1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(23, 162, 184, 0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bg1)"/>
  <rect width="1200" height="750" fill="url(#grid1)"/>

  <!-- Header -->
  <g transform="translate(40, 32)">
    <circle cx="8" cy="8" r="6" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="24" y="13" font-family="monospace" font-size="11" fill="#17a2b8" letter-spacing="2" font-weight="500">
      AI COMMIT RISK ANALYSER · INTERNSHIP · OPSTREE 2024
    </text>
  </g>

  <text x="40" y="90" font-family="Roboto, sans-serif" font-size="36" fill="#f9f1e9" font-weight="700" letter-spacing="-0.5">
    Code analysis · 29 languages · LLM review
  </text>
  <text x="40" y="122" font-family="Roboto, sans-serif" font-size="16" fill="#8a9099" font-weight="300" font-style="italic">
    SonarQube + SonarCloud + Bug Frequency Server + Master Severity Index
  </text>

  <!-- === Left column: Code review mock === -->
  <g transform="translate(40, 170)">
    <rect width="560" height="420" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>

    <!-- Window chrome -->
    <g transform="translate(16, 16)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <circle cx="24" cy="6" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="6" r="5" fill="#4ade80"/>
      <text x="70" y="10" font-family="monospace" font-size="10" fill="#8a9099">PR #247 · payment_handler.py</text>
    </g>

    <!-- Diff lines -->
    <g transform="translate(16, 46)" font-family="monospace" font-size="11">
      <g transform="translate(0, 0)">
        <text x="0" y="12" fill="#4a5262">142</text>
        <text x="32" y="12" fill="#8a9099">def process_payment(amount, user_id):</text>
      </g>
      <g transform="translate(0, 18)">
        <text x="0" y="12" fill="#4a5262">143</text>
        <text x="32" y="12" fill="#8a9099">    try:</text>
      </g>
      <g transform="translate(0, 36)">
        <rect x="24" y="0" width="520" height="16" fill="rgba(239, 68, 68, 0.15)"/>
        <text x="0" y="12" fill="#4a5262">144</text>
        <text x="32" y="12" fill="#ef4444">-       result = stripe.charge(amount)</text>
      </g>
      <g transform="translate(0, 54)">
        <rect x="24" y="0" width="520" height="16" fill="rgba(74, 222, 128, 0.15)"/>
        <text x="0" y="12" fill="#4a5262">145</text>
        <text x="32" y="12" fill="#4ade80">+       result = stripe.charge(amount, idempotency_key=uuid4())</text>
      </g>
      <g transform="translate(0, 72)">
        <text x="0" y="12" fill="#4a5262">146</text>
        <text x="32" y="12" fill="#8a9099">        return result</text>
      </g>
      <g transform="translate(0, 90)">
        <text x="0" y="12" fill="#4a5262">147</text>
        <text x="32" y="12" fill="#8a9099">    except StripeError as e:</text>
      </g>
    </g>

    <!-- LLM comment bubble -->
    <g transform="translate(40, 180)">
      <rect width="480" height="110" rx="8" fill="#0f1824" stroke="rgba(23, 162, 184, 0.35)"/>
      <g transform="translate(14, 14)">
        <circle cx="10" cy="10" r="10" fill="url(#teal1)"/>
        <text x="10" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#fff" font-weight="700">AI</text>
      </g>
      <text x="40" y="22" font-family="Roboto, sans-serif" font-size="11" fill="#17a2b8" font-weight="600">LLM Review · SEVERITY: HIGH</text>
      <text x="40" y="38" font-family="Roboto, sans-serif" font-size="11" fill="#d4d8de">Missing idempotency key on charge() — fixed ✓</text>
      <text x="40" y="56" font-family="Roboto, sans-serif" font-size="11" fill="#d4d8de">Historical bug frequency: 3 occurrences in last 90 days</text>
      <text x="40" y="74" font-family="Roboto, sans-serif" font-size="11" fill="#d4d8de">Predicted impact: financial data loss risk</text>
      <g transform="translate(40, 84)">
        <rect width="72" height="20" rx="4" fill="rgba(74, 222, 128, 0.15)" stroke="#4ade80" stroke-width="1"/>
        <text x="36" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80" font-weight="600">APPROVED</text>
      </g>
    </g>

    <!-- Language chips -->
    <g transform="translate(16, 320)">
      <text x="0" y="12" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">29 LANGUAGES SUPPORTED</text>
      <g transform="translate(0, 20)" font-family="monospace" font-size="9">
        <g><rect width="48" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="24" y="12" text-anchor="middle" fill="#17a2b8">Python</text></g>
        <g transform="translate(54, 0)"><rect width="36" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="18" y="12" text-anchor="middle" fill="#17a2b8">Java</text></g>
        <g transform="translate(96, 0)"><rect width="44" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="22" y="12" text-anchor="middle" fill="#17a2b8">C/C++</text></g>
        <g transform="translate(146, 0)"><rect width="32" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="16" y="12" text-anchor="middle" fill="#17a2b8">JS</text></g>
        <g transform="translate(184, 0)"><rect width="32" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="16" y="12" text-anchor="middle" fill="#17a2b8">TS</text></g>
        <g transform="translate(222, 0)"><rect width="30" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="15" y="12" text-anchor="middle" fill="#17a2b8">Go</text></g>
        <g transform="translate(258, 0)"><rect width="38" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="19" y="12" text-anchor="middle" fill="#17a2b8">Rust</text></g>
        <g transform="translate(302, 0)"><rect width="38" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="19" y="12" text-anchor="middle" fill="#17a2b8">Ruby</text></g>
        <g transform="translate(346, 0)"><rect width="38" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="19" y="12" text-anchor="middle" fill="#17a2b8">Kotlin</text></g>
        <g transform="translate(390, 0)"><rect width="36" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="18" y="12" text-anchor="middle" fill="#17a2b8">Swift</text></g>
        <g transform="translate(432, 0)"><rect width="64" height="18" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/><text x="32" y="12" text-anchor="middle" fill="#8a9099">+ 19 more</text></g>
      </g>

      <!-- Bug frequency chart -->
      <g transform="translate(0, 56)">
        <text x="0" y="12" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">BUG FREQUENCY · LAST 90 DAYS</text>
        <g transform="translate(0, 20)">
          <rect x="0" y="28" width="14" height="22" fill="#ef4444" rx="1"/>
          <rect x="18" y="20" width="14" height="30" fill="#ef4444" rx="1"/>
          <rect x="36" y="24" width="14" height="26" fill="url(#amber1)" rx="1"/>
          <rect x="54" y="30" width="14" height="20" fill="url(#amber1)" rx="1"/>
          <rect x="72" y="36" width="14" height="14" fill="url(#amber1)" rx="1"/>
          <rect x="90" y="38" width="14" height="12" fill="url(#green1)" rx="1"/>
          <rect x="108" y="40" width="14" height="10" fill="url(#green1)" rx="1"/>
          <rect x="126" y="42" width="14" height="8" fill="url(#green1)" rx="1"/>
          <rect x="144" y="44" width="14" height="6" fill="url(#green1)" rx="1"/>
          <line x1="0" y1="50" x2="164" y2="50" stroke="#3a4354" stroke-width="1"/>
          <!-- trend arrow -->
          <path d="M 170 20 L 210 20" stroke="#4ade80" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#arr1)"/>
          <text x="220" y="24" font-family="monospace" font-size="11" fill="#4ade80" font-weight="600">-40%</text>
          <text x="220" y="38" font-family="monospace" font-size="8" fill="#8a9099">critical bugs</text>
        </g>
      </g>
    </g>

    <defs>
      <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
      </marker>
    </defs>
  </g>

  <!-- === Right column: Metrics stack === -->
  <g transform="translate(620, 170)">
    <!-- Severity Index gauge -->
    <g>
      <rect width="540" height="180" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
      <text x="24" y="28" font-family="monospace" font-size="10" fill="#17a2b8" letter-spacing="2" font-weight="600">MASTER SEVERITY INDEX</text>

      <!-- Semi-circular gauge -->
      <g transform="translate(140, 140)">
        <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="#2a3040" stroke-width="12" stroke-linecap="round"/>
        <path d="M -80 0 A 80 80 0 0 1 50 -62" fill="none" stroke="url(#green1)" stroke-width="12" stroke-linecap="round" filter="url(#glow1)"/>
        <text x="0" y="-10" text-anchor="middle" font-family="Roboto, sans-serif" font-size="36" fill="#4ade80" font-weight="800">2.4</text>
        <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">/ 10 · LOW RISK</text>
      </g>

      <!-- Components breakdown -->
      <g transform="translate(280, 54)" font-family="Roboto, sans-serif" font-size="11">
        <g>
          <text x="0" y="0" fill="#8a9099">Code smells</text>
          <rect x="120" y="-8" width="100" height="6" rx="3" fill="#2a3040"/>
          <rect x="120" y="-8" width="32" height="6" rx="3" fill="url(#green1)"/>
          <text x="230" y="0" fill="#4ade80" font-family="monospace" font-size="10">1.2</text>
        </g>
        <g transform="translate(0, 24)">
          <text x="0" y="0" fill="#8a9099">Vulnerabilities</text>
          <rect x="120" y="-8" width="100" height="6" rx="3" fill="#2a3040"/>
          <rect x="120" y="-8" width="18" height="6" rx="3" fill="url(#green1)"/>
          <text x="230" y="0" fill="#4ade80" font-family="monospace" font-size="10">0.8</text>
        </g>
        <g transform="translate(0, 48)">
          <text x="0" y="0" fill="#8a9099">Security hotspots</text>
          <rect x="120" y="-8" width="100" height="6" rx="3" fill="#2a3040"/>
          <rect x="120" y="-8" width="24" height="6" rx="3" fill="url(#amber1)"/>
          <text x="230" y="0" fill="#fbbf24" font-family="monospace" font-size="10">1.1</text>
        </g>
        <g transform="translate(0, 72)">
          <text x="0" y="0" fill="#8a9099">Coverage gap</text>
          <rect x="120" y="-8" width="100" height="6" rx="3" fill="#2a3040"/>
          <rect x="120" y="-8" width="10" height="6" rx="3" fill="url(#green1)"/>
          <text x="230" y="0" fill="#4ade80" font-family="monospace" font-size="10">0.3</text>
        </g>
      </g>
    </g>

    <!-- Impact tiles -->
    <g transform="translate(0, 200)">
      <!-- tile 1 -->
      <rect width="175" height="100" rx="10" fill="#1a2230" stroke="rgba(239, 68, 68, 0.25)"/>
      <text x="18" y="24" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">PROD BUGS</text>
      <text x="18" y="62" font-family="Roboto, sans-serif" font-size="36" fill="#ef4444" font-weight="800">-40<tspan font-size="20" fill="#8a9099">%</tspan></text>
      <text x="18" y="84" font-family="monospace" font-size="10" fill="#8a9099">bug frequency server</text>

      <!-- tile 2 -->
      <rect x="183" width="174" height="100" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.25)"/>
      <text x="201" y="24" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">REVIEW EFFICIENCY</text>
      <text x="201" y="62" font-family="Roboto, sans-serif" font-size="36" fill="#17a2b8" font-weight="800">+50<tspan font-size="20" fill="#8a9099">%</tspan></text>
      <text x="201" y="84" font-family="monospace" font-size="10" fill="#8a9099">LLM integration</text>

      <!-- tile 3 -->
      <rect x="365" width="175" height="100" rx="10" fill="#1a2230" stroke="rgba(74, 222, 128, 0.25)"/>
      <text x="383" y="24" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">MANUAL TIME</text>
      <text x="383" y="62" font-family="Roboto, sans-serif" font-size="36" fill="#4ade80" font-weight="800">-60<tspan font-size="20" fill="#8a9099">%</tspan></text>
      <text x="383" y="84" font-family="monospace" font-size="10" fill="#8a9099">auto-triage pipeline</text>
    </g>

    <!-- Quality gate timeline -->
    <g transform="translate(0, 320)">
      <rect width="540" height="100" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
      <text x="24" y="28" font-family="monospace" font-size="10" fill="#17a2b8" letter-spacing="2" font-weight="600">QUALITY GATE · PASS RATE · +25%</text>

      <g transform="translate(24, 50)">
        <polyline points="0,30 60,28 120,22 180,18 240,14 300,10 360,6 420,4 480,2"
                  fill="none" stroke="url(#teal1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow1)"/>
        <circle cx="480" cy="2" r="4" fill="#4ade80" filter="url(#glow1)"/>
        <line x1="0" y1="38" x2="490" y2="38" stroke="#3a4354" stroke-width="1"/>
        <text x="0" y="52" font-family="monospace" font-size="8" fill="#8a9099">Q1</text>
        <text x="240" y="52" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">Q2</text>
        <text x="480" y="52" text-anchor="end" font-family="monospace" font-size="8" fill="#8a9099">NOW</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(40, 622)">
    <rect width="1120" height="60" rx="8" fill="#1a2230" stroke="rgba(23, 162, 184, 0.15)"/>
    <text x="24" y="24" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="2">TECH STACK</text>
    <g transform="translate(24, 32)" font-family="monospace" font-size="11" fill="#d4d8de">
      <text x="0" y="14">SonarQube</text>
      <text x="100" y="14" fill="#8a9099">·</text>
      <text x="110" y="14">SonarCloud</text>
      <text x="215" y="14" fill="#8a9099">·</text>
      <text x="225" y="14">LLM (automated review)</text>
      <text x="400" y="14" fill="#8a9099">·</text>
      <text x="410" y="14">Bug Frequency Server</text>
      <text x="585" y="14" fill="#8a9099">·</text>
      <text x="595" y="14">Java Relay Server</text>
      <text x="735" y="14" fill="#8a9099">·</text>
      <text x="745" y="14">Python</text>
      <text x="805" y="14" fill="#8a9099">·</text>
      <text x="815" y="14">Git integration</text>
    </g>
  </g>

  <g transform="translate(40, 710)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      OPSTREE SOLUTIONS · JUL — OCT 2024 · PYTHON DEVELOPER INTERN
    </text>
    <text x="1120" y="0" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      VAIBHAV RAJ
    </text>
  </g>
</svg>
