<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Infra Creation Automation — Gemini-powered architecture generator">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#141b26"/>
    </linearGradient>
    <linearGradient id="teal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17a2b8"/>
      <stop offset="100%" stop-color="#0f7a8c"/>
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="50%" stop-color="#9b72cb"/>
      <stop offset="100%" stop-color="#d96570"/>
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(23, 162, 184, 0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17a2b8"/>
    </marker>
  </defs>

  <rect width="1200" height="750" fill="url(#bg2)"/>
  <rect width="1200" height="750" fill="url(#grid2)"/>

  <!-- Header -->
  <g transform="translate(40, 32)">
    <circle cx="8" cy="8" r="6" fill="#4ade80"/>
    <text x="24" y="13" font-family="monospace" font-size="11" fill="#17a2b8" letter-spacing="2" font-weight="500">
      INFRA CREATION AUTOMATION · INTERNSHIP · OPSTREE 2024
    </text>
  </g>

  <text x="40" y="90" font-family="Roboto, sans-serif" font-size="36" fill="#f9f1e9" font-weight="700" letter-spacing="-0.5">
    From requirements to architecture
  </text>
  <text x="40" y="122" font-family="Roboto, sans-serif" font-size="16" fill="#8a9099" font-weight="300" font-style="italic">
    React · Django · Gemini LLM · Prompt engineering · HLD generation · Chat-based edits
  </text>

  <!-- === Left: Form UI mock === -->
  <g transform="translate(40, 170)">
    <rect width="380" height="440" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <!-- tab bar -->
    <g transform="translate(16, 16)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <circle cx="24" cy="6" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="6" r="5" fill="#4ade80"/>
      <text x="70" y="10" font-family="monospace" font-size="10" fill="#8a9099">React form · /infra/new</text>
    </g>

    <text x="24" y="60" font-family="Roboto, sans-serif" font-size="16" fill="#f9f1e9" font-weight="700">Describe your project</text>

    <!-- Field 1: App type -->
    <g transform="translate(24, 84)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">APPLICATION TYPE</text>
      <rect y="8" width="332" height="36" rx="6" fill="#0f1824" stroke="#17a2b8" stroke-width="1.5"/>
      <text x="14" y="32" font-family="Roboto, sans-serif" font-size="13" fill="#f9f1e9">Real-time analytics dashboard</text>
      <path d="M 310 24 L 316 30 L 322 24" stroke="#17a2b8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Field 2: Expected load -->
    <g transform="translate(24, 146)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">EXPECTED LOAD</text>
      <rect y="8" width="332" height="36" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
      <text x="14" y="32" font-family="Roboto, sans-serif" font-size="13" fill="#f9f1e9">~10k requests/min · 50 concurrent users</text>
    </g>

    <!-- Field 3: Checkboxes -->
    <g transform="translate(24, 208)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">REQUIREMENTS</text>
      <g transform="translate(0, 14)" font-family="Roboto, sans-serif" font-size="12" fill="#d4d8de">
        <g><rect width="14" height="14" rx="3" fill="url(#teal2)"/><path d="M 3 7 L 6 10 L 11 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="12">Auto-scaling</text></g>
        <g transform="translate(0, 22)"><rect width="14" height="14" rx="3" fill="url(#teal2)"/><path d="M 3 7 L 6 10 L 11 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="12">Real-time data streams</text></g>
        <g transform="translate(0, 44)"><rect width="14" height="14" rx="3" fill="url(#teal2)"/><path d="M 3 7 L 6 10 L 11 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="12">High availability (99.9%)</text></g>
        <g transform="translate(0, 66)"><rect width="14" height="14" rx="3" fill="#0f1824" stroke="rgba(23, 162, 184, 0.4)"/><text x="24" y="12">Multi-region</text></g>
        <g transform="translate(0, 88)"><rect width="14" height="14" rx="3" fill="url(#teal2)"/><path d="M 3 7 L 6 10 L 11 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="12">Encrypted at rest</text></g>
      </g>
    </g>

    <!-- Generate button -->
    <g transform="translate(24, 360)">
      <rect width="332" height="44" rx="8" fill="url(#teal2)" filter="url(#glow2)"/>
      <!-- sparkle icon -->
      <g transform="translate(80, 22)">
        <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#fff"/>
      </g>
      <text x="176" y="28" text-anchor="middle" font-family="Roboto, sans-serif" font-size="13" fill="#fff" font-weight="600">
        Generate architecture
      </text>
    </g>

    <text x="24" y="420" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">CONTEXT PRESERVED · CHAT-BASED EDITS ENABLED</text>
  </g>

  <!-- Arrow from form → Gemini → diagram -->
  <g transform="translate(440, 380)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#17a2b8" stroke-width="2" marker-end="url(#arr2)" stroke-dasharray="4 3"/>
    <text x="20" y="-10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8a9099">prompt</text>
  </g>

  <!-- Gemini pill -->
  <g transform="translate(490, 352)">
    <rect width="140" height="56" rx="28" fill="url(#gem)" filter="url(#glow2)"/>
    <g transform="translate(18, 12)">
      <!-- Gemini-like spark icon -->
      <path d="M 16 0 L 19 13 L 32 16 L 19 19 L 16 32 L 13 19 L 0 16 L 13 13 Z" fill="#fff"/>
    </g>
    <text x="95" y="34" text-anchor="middle" font-family="Roboto, sans-serif" font-size="14" fill="#fff" font-weight="700">Gemini LLM</text>
  </g>

  <g transform="translate(650, 380)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#17a2b8" stroke-width="2" marker-end="url(#arr2)" stroke-dasharray="4 3"/>
    <text x="20" y="-10" text-anchor="middle" font-family="monospace" font-size="9" fill="#8a9099">HLD</text>
  </g>

  <!-- === Right: Generated architecture diagram === -->
  <g transform="translate(700, 170)">
    <rect width="460" height="440" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <g transform="translate(16, 16)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <circle cx="24" cy="6" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="6" r="5" fill="#4ade80"/>
      <text x="70" y="10" font-family="monospace" font-size="10" fill="#8a9099">Generated HLD · recommended stack</text>
    </g>

    <!-- Architecture nodes -->
    <g transform="translate(20, 60)">
      <!-- Client tier -->
      <g>
        <rect width="420" height="56" rx="8" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="12" y="20" font-family="monospace" font-size="8" fill="#17a2b8" letter-spacing="1">CLIENT</text>
        <g transform="translate(12, 28)">
          <rect width="80" height="20" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="40" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">React SPA</text>
        </g>
        <g transform="translate(100, 28)">
          <rect width="86" height="20" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="43" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">Mobile (iOS/Android)</text>
        </g>
      </g>

      <!-- arrow down -->
      <line x1="210" y1="60" x2="210" y2="78" stroke="#17a2b8" stroke-width="1.5" marker-end="url(#arr2)"/>

      <!-- Gateway -->
      <g transform="translate(0, 82)">
        <rect width="420" height="42" rx="8" fill="url(#teal2)" opacity="0.85"/>
        <text x="12" y="18" font-family="monospace" font-size="8" fill="#fff" letter-spacing="1" opacity="0.85">API GATEWAY · RATE LIMIT · AUTH</text>
        <text x="12" y="34" font-family="Roboto, sans-serif" font-size="12" fill="#fff" font-weight="600">AWS API Gateway + Cognito</text>
      </g>

      <line x1="210" y1="130" x2="210" y2="148" stroke="#17a2b8" stroke-width="1.5" marker-end="url(#arr2)"/>

      <!-- Service tier -->
      <g transform="translate(0, 152)">
        <rect width="420" height="68" rx="8" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="12" y="18" font-family="monospace" font-size="8" fill="#17a2b8" letter-spacing="1">SERVICES · AUTOSCALED</text>
        <g transform="translate(12, 28)">
          <rect width="95" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="48" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">ECS Fargate</text>
          <text x="48" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">Django API</text>
        </g>
        <g transform="translate(115, 28)">
          <rect width="95" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="48" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">Lambda</text>
          <text x="48" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">stream handler</text>
        </g>
        <g transform="translate(218, 28)">
          <rect width="95" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="48" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">Kinesis</text>
          <text x="48" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">event bus</text>
        </g>
        <g transform="translate(321, 28)">
          <rect width="87" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="44" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">SQS/SNS</text>
          <text x="44" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">queues</text>
        </g>
      </g>

      <line x1="210" y1="226" x2="210" y2="244" stroke="#17a2b8" stroke-width="1.5" marker-end="url(#arr2)"/>

      <!-- Data tier -->
      <g transform="translate(0, 248)">
        <rect width="420" height="68" rx="8" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="12" y="18" font-family="monospace" font-size="8" fill="#17a2b8" letter-spacing="1">DATA · ENCRYPTED AT REST</text>
        <g transform="translate(12, 28)">
          <rect width="120" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="60" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">Aurora Postgres</text>
          <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">primary + read replicas</text>
        </g>
        <g transform="translate(140, 28)">
          <rect width="120" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="60" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">Redis ElastiCache</text>
          <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">session · hot cache</text>
        </g>
        <g transform="translate(268, 28)">
          <rect width="140" height="32" rx="4" fill="#1a2230" stroke="rgba(23, 162, 184, 0.4)"/>
          <text x="70" y="14" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#f9f1e9">S3 + CloudFront</text>
          <text x="70" y="26" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">static assets · CDN</text>
        </g>
      </g>

      <!-- Observability -->
      <g transform="translate(0, 330)">
        <rect width="420" height="42" rx="8" fill="#0f1824" stroke="rgba(74, 222, 128, 0.3)"/>
        <text x="12" y="18" font-family="monospace" font-size="8" fill="#4ade80" letter-spacing="1">OBSERVABILITY</text>
        <text x="12" y="32" font-family="Roboto, sans-serif" font-size="11" fill="#d4d8de">CloudWatch · X-Ray tracing · Grafana dashboards</text>
      </g>
    </g>
  </g>

  <!-- === Bottom metrics === -->
  <g transform="translate(40, 622)">
    <rect width="340" height="80" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <text x="20" y="22" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">MANUAL INPUT REDUCED</text>
    <text x="20" y="62" font-family="Roboto, sans-serif" font-size="38" fill="#4ade80" font-weight="800">-40<tspan font-size="22" fill="#8a9099">%</tspan></text>
    <text x="170" y="62" font-family="monospace" font-size="10" fill="#8a9099">chat-based<tspan x="170" dy="14">modifications</tspan></text>
  </g>

  <g transform="translate(400, 622)">
    <rect width="340" height="80" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <text x="20" y="22" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">PLANNING ACCURACY</text>
    <text x="20" y="62" font-family="Roboto, sans-serif" font-size="38" fill="#17a2b8" font-weight="800">+25<tspan font-size="22" fill="#8a9099">%</tspan></text>
    <text x="170" y="62" font-family="monospace" font-size="10" fill="#8a9099">HLD generation<tspan x="170" dy="14">with visual overview</tspan></text>
  </g>

  <g transform="translate(760, 622)">
    <rect width="400" height="80" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <text x="20" y="22" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">CHAT-BASED EDITS</text>
    <text x="20" y="50" font-family="Roboto, sans-serif" font-size="13" fill="#d4d8de">&gt; Change Postgres to DynamoDB</text>
    <text x="20" y="68" font-family="Roboto, sans-serif" font-size="13" fill="#4ade80">✓ context preserved · HLD updated</text>
  </g>

  <g transform="translate(40, 728)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      OPSTREE SOLUTIONS · INFRA AUTOMATION · 2024
    </text>
    <text x="1120" y="0" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      VAIBHAV RAJ
    </text>
  </g>
</svg>
