<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Automated Waste Segregation — CNN classifier with Flask UI">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#141b26"/>
    </linearGradient>
    <linearGradient id="teal3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17a2b8"/>
      <stop offset="100%" stop-color="#0f7a8c"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(23, 162, 184, 0.06)" stroke-width="1"/>
    </pattern>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17a2b8"/>
    </marker>
  </defs>

  <rect width="1200" height="750" fill="url(#bg3)"/>
  <rect width="1200" height="750" fill="url(#grid3)"/>

  <!-- Header -->
  <g transform="translate(40, 32)">
    <circle cx="8" cy="8" r="6" fill="#4ade80"/>
    <text x="24" y="13" font-family="monospace" font-size="11" fill="#17a2b8" letter-spacing="2" font-weight="500">
      WASTE SEGREGATION · ACADEMIC · BCA · 2024
    </text>
  </g>

  <text x="40" y="90" font-family="Roboto, sans-serif" font-size="36" fill="#f9f1e9" font-weight="700" letter-spacing="-0.5">
    CNN classifier · Organic vs Recyclable
  </text>
  <text x="40" y="122" font-family="Roboto, sans-serif" font-size="16" fill="#8a9099" font-weight="300" font-style="italic">
    TensorFlow · Flask backend · Real-time web UI · My first end-to-end CV build
  </text>

  <!-- === Left: Input image panel === -->
  <g transform="translate(40, 170)">
    <rect width="360" height="440" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <g transform="translate(16, 16)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <circle cx="24" cy="6" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="6" r="5" fill="#4ade80"/>
      <text x="70" y="10" font-family="monospace" font-size="10" fill="#8a9099">Input · banana_peel.jpg</text>
    </g>

    <!-- Stylized banana peel illustration -->
    <g transform="translate(180, 230)">
      <!-- frame behind -->
      <rect x="-130" y="-130" width="260" height="260" rx="8" fill="#0f1824" stroke="rgba(23, 162, 184, 0.25)"/>
      <!-- banana peel shape -->
      <g transform="rotate(-20)">
        <path d="M -60 -80 Q -40 -100 0 -90 Q 40 -80 60 -50 Q 80 -10 60 30 Q 40 70 0 80 Q -40 90 -60 60 Q -80 20 -75 -20 Z" fill="#facc15" opacity="0.9"/>
        <path d="M -40 -70 Q -20 -80 10 -70 Q 40 -60 50 -30 Q 60 0 45 25 Q 30 50 0 55 Q -30 60 -50 35 Q -70 5 -60 -30 Z" fill="#eab308"/>
        <!-- highlights -->
        <ellipse cx="-20" cy="-40" rx="15" ry="6" fill="#fef08a" opacity="0.5"/>
        <ellipse cx="20" cy="20" rx="12" ry="5" fill="#fef08a" opacity="0.4"/>
        <!-- stem -->
        <rect x="-8" y="-88" width="16" height="14" rx="2" fill="#713f12"/>
      </g>
      <!-- Bounding box -->
      <rect x="-115" y="-115" width="230" height="230" fill="none" stroke="#17a2b8" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
      <g transform="translate(-112, -126)">
        <rect width="88" height="14" rx="2" fill="#17a2b8"/>
        <text x="6" y="11" font-family="monospace" font-size="9" fill="#fff" font-weight="600">ORGANIC · 0.96</text>
      </g>
    </g>

    <!-- Drop zone cue -->
    <g transform="translate(30, 390)">
      <rect width="300" height="36" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.4)" stroke-dasharray="4 3"/>
      <g transform="translate(14, 12)">
        <rect x="0" y="4" width="14" height="10" rx="1" fill="none" stroke="#8a9099" stroke-width="1.5"/>
        <path d="M 0 6 L 3 3 L 8 3 L 9 6" fill="none" stroke="#8a9099" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
      <text x="150" y="22" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#8a9099">
        Drop image or click to upload
      </text>
    </g>
  </g>

  <!-- === Middle: CNN architecture === -->
  <g transform="translate(420, 170)">
    <rect width="400" height="440" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.2)"/>
    <text x="20" y="28" font-family="monospace" font-size="10" fill="#17a2b8" letter-spacing="2" font-weight="600">CNN ARCHITECTURE</text>

    <!-- Layered network visualization -->
    <g transform="translate(30, 56)">
      <!-- Conv1 -->
      <g>
        <rect width="60" height="90" rx="4" fill="url(#blue3)" opacity="0.25"/>
        <rect x="2" y="2" width="56" height="86" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="30" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa" font-weight="600">CONV</text>
        <text x="30" y="48" text-anchor="middle" font-family="monospace" font-size="9" fill="#d4d8de">32×32</text>
        <text x="30" y="62" text-anchor="middle" font-family="monospace" font-size="9" fill="#8a9099">3×3</text>
      </g>
      <!-- Pool1 -->
      <g transform="translate(80, 12)">
        <rect width="40" height="66" rx="4" fill="url(#blue3)" opacity="0.18"/>
        <rect x="2" y="2" width="36" height="62" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="20" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">POOL</text>
        <text x="20" y="38" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">max 2×2</text>
      </g>
      <!-- Conv2 -->
      <g transform="translate(140, 6)">
        <rect width="50" height="78" rx="4" fill="url(#blue3)" opacity="0.3"/>
        <rect x="2" y="2" width="46" height="74" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="25" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa" font-weight="600">CONV</text>
        <text x="25" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#d4d8de">64×64</text>
      </g>
      <!-- Pool2 -->
      <g transform="translate(210, 18)">
        <rect width="32" height="54" rx="4" fill="url(#blue3)" opacity="0.22"/>
        <rect x="2" y="2" width="28" height="50" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
        <text x="16" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">POOL</text>
      </g>
      <!-- Dense -->
      <g transform="translate(260, 24)">
        <line x1="0" y1="0" x2="0" y2="42" stroke="#4ade80" stroke-width="2"/>
        <line x1="10" y1="-4" x2="10" y2="46" stroke="#4ade80" stroke-width="2"/>
        <line x1="20" y1="-2" x2="20" y2="44" stroke="#4ade80" stroke-width="2"/>
        <line x1="30" y1="2" x2="30" y2="40" stroke="#4ade80" stroke-width="2"/>
        <line x1="40" y1="-2" x2="40" y2="44" stroke="#4ade80" stroke-width="2"/>
        <line x1="50" y1="6" x2="50" y2="36" stroke="#4ade80" stroke-width="2"/>
        <text x="25" y="-10" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80" font-weight="600">DENSE</text>
        <text x="25" y="60" text-anchor="middle" font-family="monospace" font-size="8" fill="#8a9099">128 units</text>
      </g>
    </g>

    <!-- Activation bars -->
    <g transform="translate(30, 200)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">FEATURE MAP ACTIVATIONS</text>
      <g transform="translate(0, 12)">
        <rect x="0" y="20" width="14" height="60" fill="#60a5fa" opacity="0.9"/>
        <rect x="18" y="10" width="14" height="70" fill="#60a5fa" opacity="0.8"/>
        <rect x="36" y="30" width="14" height="50" fill="#60a5fa" opacity="0.7"/>
        <rect x="54" y="5" width="14" height="75" fill="#60a5fa" opacity="0.95"/>
        <rect x="72" y="25" width="14" height="55" fill="#60a5fa" opacity="0.75"/>
        <rect x="90" y="15" width="14" height="65" fill="#60a5fa" opacity="0.85"/>
        <rect x="108" y="40" width="14" height="40" fill="#60a5fa" opacity="0.6"/>
        <rect x="126" y="8" width="14" height="72" fill="#60a5fa" opacity="0.9"/>
        <rect x="144" y="35" width="14" height="45" fill="#60a5fa" opacity="0.7"/>
        <rect x="162" y="18" width="14" height="62" fill="#60a5fa" opacity="0.85"/>
        <rect x="180" y="28" width="14" height="52" fill="#60a5fa" opacity="0.75"/>
        <rect x="198" y="12" width="14" height="68" fill="#60a5fa" opacity="0.9"/>
        <rect x="216" y="22" width="14" height="58" fill="#60a5fa" opacity="0.8"/>
        <rect x="234" y="6" width="14" height="74" fill="#60a5fa" opacity="0.95"/>
        <rect x="252" y="32" width="14" height="48" fill="#60a5fa" opacity="0.7"/>
        <rect x="270" y="16" width="14" height="64" fill="#60a5fa" opacity="0.85"/>
        <rect x="288" y="26" width="14" height="54" fill="#60a5fa" opacity="0.78"/>
        <rect x="306" y="14" width="14" height="66" fill="#60a5fa" opacity="0.88"/>
        <rect x="324" y="20" width="14" height="60" fill="#60a5fa" opacity="0.82"/>
      </g>
    </g>

    <!-- Output -->
    <g transform="translate(30, 310)">
      <text x="0" y="0" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">SOFTMAX OUTPUT</text>
      <g transform="translate(0, 14)">
        <rect width="340" height="36" rx="6" fill="#0f1824" stroke="rgba(74, 222, 128, 0.4)"/>
        <circle cx="22" cy="18" r="6" fill="#4ade80"/>
        <text x="38" y="22" font-family="Roboto, sans-serif" font-size="12" fill="#4ade80" font-weight="700">Organic</text>
        <rect x="100" y="12" width="180" height="12" rx="6" fill="#2a3040"/>
        <rect x="100" y="12" width="172" height="12" rx="6" fill="url(#green3)"/>
        <text x="292" y="22" text-anchor="end" font-family="monospace" font-size="11" fill="#4ade80" font-weight="700">96%</text>
      </g>
      <g transform="translate(0, 60)">
        <rect width="340" height="36" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.25)"/>
        <circle cx="22" cy="18" r="6" fill="#60a5fa"/>
        <text x="38" y="22" font-family="Roboto, sans-serif" font-size="12" fill="#8a9099" font-weight="500">Recyclable</text>
        <rect x="100" y="12" width="180" height="12" rx="6" fill="#2a3040"/>
        <rect x="100" y="12" width="8" height="12" rx="6" fill="#60a5fa"/>
        <text x="292" y="22" text-anchor="end" font-family="monospace" font-size="11" fill="#8a9099" font-weight="500">4%</text>
      </g>
    </g>
  </g>

  <!-- === Right: Result + recommendation === -->
  <g transform="translate(840, 170)">
    <rect width="320" height="440" rx="10" fill="#1a2230" stroke="rgba(74, 222, 128, 0.3)"/>

    <g transform="translate(16, 16)">
      <circle cx="6" cy="6" r="5" fill="#ef4444"/>
      <circle cx="24" cy="6" r="5" fill="#fbbf24"/>
      <circle cx="42" cy="6" r="5" fill="#4ade80"/>
      <text x="70" y="10" font-family="monospace" font-size="10" fill="#8a9099">Classification result</text>
    </g>

    <!-- Big result icon -->
    <g transform="translate(160, 140)">
      <circle r="70" fill="url(#green3)" opacity="0.15"/>
      <circle r="56" fill="url(#green3)" opacity="0.3" filter="url(#glow3)"/>
      <!-- Leaf icon -->
      <g transform="translate(-22, -26)">
        <path d="M 22 0 Q 44 12 44 30 Q 44 50 22 52 Q 0 50 0 30 Q 0 12 22 0 Z" fill="#4ade80"/>
        <path d="M 22 4 L 22 50" stroke="#16a34a" stroke-width="2"/>
        <path d="M 22 14 Q 14 16 10 22" stroke="#16a34a" stroke-width="1.5" fill="none"/>
        <path d="M 22 14 Q 30 16 34 22" stroke="#16a34a" stroke-width="1.5" fill="none"/>
        <path d="M 22 26 Q 14 28 10 34" stroke="#16a34a" stroke-width="1.5" fill="none"/>
        <path d="M 22 26 Q 30 28 34 34" stroke="#16a34a" stroke-width="1.5" fill="none"/>
      </g>
    </g>

    <text x="160" y="240" text-anchor="middle" font-family="Roboto, sans-serif" font-size="24" fill="#4ade80" font-weight="800">ORGANIC</text>
    <text x="160" y="262" text-anchor="middle" font-family="monospace" font-size="11" fill="#8a9099" letter-spacing="1">CONFIDENCE · 96%</text>

    <!-- Recycling recommendation -->
    <g transform="translate(20, 290)">
      <rect width="280" height="130" rx="8" fill="#0f1824" stroke="rgba(74, 222, 128, 0.3)"/>
      <text x="14" y="22" font-family="monospace" font-size="9" fill="#4ade80" letter-spacing="1" font-weight="600">RECYCLING GUIDANCE</text>
      <text x="14" y="46" font-family="Roboto, sans-serif" font-size="12" fill="#d4d8de" font-weight="600">Compost this item</text>
      <g font-family="Roboto, sans-serif" font-size="11" fill="#8a9099">
        <text x="14" y="68">• Add to organic waste bin</text>
        <text x="14" y="86">• Contains nitrogen-rich matter</text>
        <text x="14" y="104">• Breaks down in 2-4 weeks</text>
        <text x="14" y="122">• Avoid mixing with plastic</text>
      </g>
    </g>
  </g>

  <!-- Bottom tech stack -->
  <g transform="translate(40, 622)">
    <rect width="1120" height="80" rx="10" fill="#1a2230" stroke="rgba(23, 162, 184, 0.15)"/>
    <text x="24" y="24" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="2">TECH STACK · END-TO-END</text>

    <g transform="translate(24, 38)">
      <!-- Flow chips -->
      <g>
        <rect width="120" height="32" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="60" y="21" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#f9f1e9">Web UI (HTML/CSS)</text>
      </g>
      <text x="126" y="22" font-family="monospace" fill="#17a2b8">→</text>
      <g transform="translate(140, 0)">
        <rect width="100" height="32" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="50" y="21" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#f9f1e9">Flask API</text>
      </g>
      <text x="246" y="22" font-family="monospace" fill="#17a2b8">→</text>
      <g transform="translate(260, 0)">
        <rect width="120" height="32" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="60" y="21" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#f9f1e9">TensorFlow CNN</text>
      </g>
      <text x="386" y="22" font-family="monospace" fill="#17a2b8">→</text>
      <g transform="translate(400, 0)">
        <rect width="120" height="32" rx="6" fill="#0f1824" stroke="rgba(23, 162, 184, 0.3)"/>
        <text x="60" y="21" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#f9f1e9">Classification</text>
      </g>
      <text x="526" y="22" font-family="monospace" fill="#17a2b8">→</text>
      <g transform="translate(540, 0)">
        <rect width="150" height="32" rx="6" fill="url(#green3)" opacity="0.25"/>
        <text x="75" y="21" text-anchor="middle" font-family="Roboto, sans-serif" font-size="11" fill="#4ade80" font-weight="600">Recycling advice</text>
      </g>

      <!-- Right-side dataset note -->
      <g transform="translate(800, 0)">
        <text x="0" y="10" font-family="monospace" font-size="9" fill="#8a9099" letter-spacing="1">DATASET</text>
        <text x="0" y="28" font-family="Roboto, sans-serif" font-size="12" fill="#d4d8de">Kaggle · 25K labeled images</text>
      </g>
    </g>
  </g>

  <g transform="translate(40, 728)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      ACADEMIC · BCA · FIRST END-TO-END COMPUTER VISION BUILD
    </text>
    <text x="1120" y="0" text-anchor="end" font-family="monospace" font-size="10" fill="#4a5262" letter-spacing="1">
      VAIBHAV RAJ
    </text>
  </g>
</svg>
