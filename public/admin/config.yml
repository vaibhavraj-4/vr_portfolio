# ====================================================================
# DECAP CMS CONFIG
# This file defines the admin panel forms that edit your portfolio content.
# Backend = Git Gateway (Netlify Identity handles auth, commits go to GitHub).
# ====================================================================

backend:
  name: git-gateway
  branch: main

# Where uploaded images go (in your repo)
media_folder: "public/uploads"
# URL where those images are served from
public_folder: "/uploads"

# Editorial workflow = draft/review/publish flow (change to "simple" for instant publish)
publish_mode: simple

site_url: https://vaibhavraj.dev
display_url: https://vaibhavraj.dev
logo_url: /icons/vaibhav_logo.png

# ====================================================================
# COLLECTIONS
# ====================================================================
collections:

  # ------------------------------------------------------------------
  # HERO (single file)
  # ------------------------------------------------------------------
  - name: "hero"
    label: "🏠 Hero Section"
    description: "The top of the homepage — name, role, tagline."
    files:
      - name: "index"
        label: "Hero Content"
        file: "src/content/hero/index.json"
        fields:
          - { name: "name", label: "Name", widget: "string", default: "Vaibhav Raj" }
          - { name: "role", label: "Role line", widget: "string", hint: "Shows under your name, e.g. 'AI/ML Engineer · ATH Infosystems'" }
          - { name: "tagline", label: "Tagline", widget: "string", hint: "Italic text at the bottom of the hero" }
          - { name: "status", label: "Status", widget: "string", hint: "Optional status like 'Engaged · SINTRA Phase 1 of 10'" }

  # ------------------------------------------------------------------
  # ABOUT (single file)
  # ------------------------------------------------------------------
  - name: "about"
    label: "📝 About Section"
    description: "Typed.js intro strings and About Me prose blocks."
    files:
      - name: "index"
        label: "About Content"
        file: "src/content/about/index.json"
        fields:
          - name: "typedStrings"
            label: "Typed.js rotating strings"
            widget: "list"
            field: { name: "string", label: "Phrase", widget: "string" }
            hint: "Phrases that rotate in the animated typing effect at the top of About."
          - name: "blocks"
            label: "Prose Blocks"
            widget: "list"
            summary: "{{fields.heading}}"
            fields:
              - { name: "heading", label: "Heading", widget: "string" }
              - { name: "body", label: "Body (HTML allowed)", widget: "text", hint: "Supports basic HTML like <strong>, <em>, <br>" }

  # ------------------------------------------------------------------
  # SKILLS (collection)
  # ------------------------------------------------------------------
  - name: "skills"
    label: "🧠 Skills"
    label_singular: "Skill"
    description: "Individual skills with icons shown in the About section grid."
    folder: "src/content/skills"
    format: "json"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    summary: "{{name}} ({{category}})"
    fields:
      - { name: "name", label: "Skill name", widget: "string" }
      - { name: "icon", label: "Icon image", widget: "image", hint: "Upload or pick a logo image" }
      - name: "category"
        label: "Category"
        widget: "select"
        options: ["Languages", "Data & ML", "Infra", "APIs & LLMs", "Other"]
        default: "Other"
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100, hint: "Lower numbers appear first" }

  # ------------------------------------------------------------------
  # JOURNEY (collection)
  # ------------------------------------------------------------------
  - name: "journey"
    label: "🚀 Journey / Experience"
    label_singular: "Journey entry"
    description: "Timeline of roles — work, education, internships."
    folder: "src/content/journey"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{order}}-{{slug}}"
    summary: "{{title}} @ {{org}} — {{dateRange}}"
    fields:
      - { name: "title", label: "Role / Title", widget: "string", hint: "e.g. 'AI/ML Engineer'" }
      - { name: "org", label: "Organization", widget: "string", hint: "e.g. 'ATH Infosystems'" }
      - { name: "dateRange", label: "Date range", widget: "string", hint: "e.g. 'November 2025 — Present'" }
      - { name: "location", label: "Location", widget: "string", required: false }
      - { name: "description", label: "Description (HTML allowed)", widget: "text" }
      - name: "skills"
        label: "Skill tags"
        widget: "list"
        field: { name: "skill", label: "Skill", widget: "string" }
        required: false
      - { name: "logo", label: "Company logo", widget: "image", required: false }
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100 }
      - name: "side"
        label: "Timeline side"
        widget: "select"
        options: ["left", "right"]
        default: "left"
        hint: "Which side of the timeline spine this entry appears on (desktop only)"
      - { name: "current", label: "Currently in this role?", widget: "boolean", default: false }

  # ------------------------------------------------------------------
  # PROJECTS (collection)
  # ------------------------------------------------------------------
  - name: "projects"
    label: "💼 Projects"
    label_singular: "Project"
    description: "Portfolio projects grouped into Production / Internship / Academic ML / For Fun."
    folder: "src/content/projects"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{order}}-{{slug}}"
    summary: "{{title}} [{{section}}]"
    fields:
      - { name: "title", label: "Project title", widget: "string" }
      - name: "section"
        label: "Section"
        widget: "select"
        options: ["Production Work", "Internship", "Academic ML", "For Fun"]
        default: "Academic ML"
      - name: "status"
        label: "Status"
        widget: "select"
        options: ["Active", "Shipped", "Archived"]
        required: false
      - { name: "statusLabel", label: "Status badge text", widget: "string", required: false, hint: "Full status shown as chip, e.g. 'Active · Phase 1 of 10'" }
      - { name: "summary", label: "One-line summary", widget: "string" }
      - { name: "description", label: "Full description (HTML allowed)", widget: "text" }
      - { name: "image", label: "Project image", widget: "image", required: false }
      - { name: "link", label: "External link", widget: "string", required: false }
      - { name: "linkLabel", label: "Link button label", widget: "string", default: "View project →" }
      - name: "tags"
        label: "Tech tags"
        widget: "list"
        field: { name: "tag", label: "Tag", widget: "string" }
        required: false
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100 }
      - { name: "featured", label: "Featured?", widget: "boolean", default: false }

  # ------------------------------------------------------------------
  # CERTIFICATES
  # ------------------------------------------------------------------
  - name: "certificates"
    label: "🎓 Certificates"
    label_singular: "Certificate"
    folder: "src/content/certificates"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{order}}-{{slug}}"
    summary: "{{title}} ({{issuer}})"
    fields:
      - { name: "title", label: "Certificate title", widget: "string" }
      - { name: "issuer", label: "Issuer", widget: "string", required: false, hint: "e.g. 'Coursera', 'Google', 'IBM'" }
      - { name: "image", label: "Certificate image", widget: "image" }
      - { name: "link", label: "Credential URL", widget: "string", required: false }
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100 }

  # ------------------------------------------------------------------
  # AWARDS
  # ------------------------------------------------------------------
  - name: "awards"
    label: "🏆 Awards"
    label_singular: "Award"
    folder: "src/content/awards"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{order}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Award title", widget: "string" }
      - { name: "image", label: "Image", widget: "image" }
      - { name: "link", label: "Link URL", widget: "string", required: false }
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100 }

  # ------------------------------------------------------------------
  # ACTIVITIES
  # ------------------------------------------------------------------
  - name: "activities"
    label: "🎯 Activities"
    label_singular: "Activity"
    folder: "src/content/activities"
    format: "json"
    create: true
    identifier_field: "title"
    slug: "{{order}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Activity title", widget: "string" }
      - { name: "image", label: "Image", widget: "image" }
      - { name: "link", label: "Link URL", widget: "string", required: false }
      - { name: "order", label: "Sort order", widget: "number", value_type: "int", default: 100 }

  # ------------------------------------------------------------------
  # CONTACT (single file)
  # ------------------------------------------------------------------
  - name: "contact"
    label: "📬 Contact Section"
    description: "Contact info shown at the bottom of the page."
    files:
      - name: "index"
        label: "Contact Content"
        file: "src/content/contact/index.json"
        fields:
          - { name: "headline", label: "Headline (HTML allowed)", widget: "string" }
          - { name: "lead", label: "Lead paragraph", widget: "text" }
          - { name: "email", label: "Email", widget: "string" }
          - { name: "phone", label: "Phone", widget: "string", required: false }
          - { name: "linkedin", label: "LinkedIn URL", widget: "string", required: false }
          - { name: "github", label: "GitHub URL", widget: "string", required: false }
          - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
          - { name: "facebook", label: "Facebook URL", widget: "string", required: false }
          - { name: "location", label: "Location", widget: "string" }
          - { name: "resumeUrl", label: "Résumé PDF URL", widget: "string", default: "/resume.pdf" }
